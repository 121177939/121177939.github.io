.scan-overlay::before,

  content:"";

  left:50%;
  transform:translateX(-50%);
  width:min(72vw,300px);
  height:min(72vw,300px);
  pointer-events:none;

}
.scan-overlay::after{

  top:50%;
  width:min(72vw,300px);

  z-index:2;

}
.scan-viewfinder .corner{
  position:absolute;

  height:34px;

<script>
const store = {
  load(key, fallback){
    try{return JSON.parse(localStorage.getItem(key)) ?? fallback}catch(e){return fallback}
  },
  save(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
};

const state = {
  products: store.load('jxc_products', []),
  sales: store.load('jxc_sales', []),
  suppliers: store.load('jxc_suppliers', []),
  tradeinOrders: store.load('jxc_tradein_orders', []),
  orders: store.load('jxc_orders', [
    {id:id(), status:'normal', date:'03-08', buyer:'象兄', product:'华为手表', orderAmount:2150, rebate:0, freight:0, saleAmount:2150, profit:0, trackingNo:'', remark:''},
    {id:id(), status:'normal', date:'03-08', buyer:'标', product:'赫莲娜小白瓶', orderAmount:1170, rebate:50, freight:0, saleAmount:1170, profit:-50, trackingNo:'', remark:''},
    {id:id(), status:'normal', date:'03-07', buyer:'晶1', product:'vivos50', orderAmount:2469, rebate:0, freight:0, saleAmount:2469, profit:0, trackingNo:'', remark:''}
  ]),
  tab: 'home',
  orderSearch: '',
  orderDraft: store.load('jxc_order_draft', {}),
  noticeTemplates: store.load('jxc_notice_templates', [
    '不砍不盾，下啥发啥，绝不反撸，🛫！！！'
  ]),
  homeProfitVisible: store.load('jxc_home_profit_visible', true),
  selectedOrderIds: store.load('jxc_selected_order_ids', []),
  reportTradeinVisible: store.load('jxc_report_tradein_visible', false),
  reportMonth: store.load('jxc_report_month', String(new Date().getMonth() + 1).padStart(2,'0')),
  reportPage: store.load('jxc_report_page', 1),
  reportTradeinPage: store.load('jxc_report_tradein_page', 1),
  adminListVisible: store.load('jxc_admin_list_visible', false),
  adminAccountSearch: store.load('jxc_admin_account_search', ''),
  adminUsers: [],
  adminLoginStatsVisible: store.load('jxc_admin_login_stats_visible', false),
  loginStats: store.load('jxc_login_stats', {}),
  adminLoginStats: null,
  lastDataHealth: store.load('jxc_last_data_health', null),
  dataHealthVisible: store.load('jxc_data_health_visible', false),
};

function id(){
  return 'id_' + Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
}
state.orders = state.orders.map(o => ({
  id: o.id || id(),
  status: o.status === 'advance' ? 'advance' : 'normal',
  date: o.date || new Date().toISOString().slice(5,10),
  buyer: o.buyer ?? o.customer ?? '',
  product: o.product ?? '',
  orderAmount: Number(o.orderAmount ?? 0),
  rebate: Number(o.rebate ?? o.refund ?? 0),
  freight: Number(o.freight ?? o.shipping ?? 0),
  saleAmount: Number(o.saleAmount ?? o.sellAmount ?? 0),
  profit: Number(o.profit ?? 0),
  trackingNo: o.trackingNo ?? o.trackingNumber ?? '',
  remark: o.remark ?? o.notes ?? ''
}));
state.tradeinOrders = (state.tradeinOrders || []).map(o => ({
  id: o.id || id(),
  date: o.date || new Date().toISOString().slice(5,10),
  buyer: o.buyer ?? o.customer ?? '',
  newMachinePrice: Number(o.newMachinePrice ?? o.newPrice ?? 0),
  oldMachinePrice: Number(o.oldMachinePrice ?? o.oldPrice ?? 0),
  recyclePrice: Number(o.recyclePrice ?? o.recycleCashback ?? 0),
  refundPrice: Number(o.refundPrice ?? o.refund ?? 0),
  salePrice: Number(o.salePrice ?? o.saleAmount ?? 0),
  profit: Number(o.profit ?? 0),
  trackingNo: o.trackingNo ?? o.trackingNumber ?? '',
  remark: o.remark ?? o.notes ?? '',
  dealDone: typeof o.dealDone === 'boolean' ? o.dealDone : Number(o.salePrice ?? o.saleAmount ?? 0) > 0
}));

function persist(){
  store.save('jxc_products', state.products);
  store.save('jxc_sales', state.sales);
  store.save('jxc_suppliers', state.suppliers);
  store.save('jxc_tradein_orders', state.tradeinOrders);
  store.save('jxc_orders', state.orders);
  if(authState && authState.user){
    scheduleCloudSave('persist');
  }
}

function sortByDateDesc(list){
  return [...list].sort((a,b)=> String(b.date).localeCompare(String(a.date)));
}
function advanceOrders(){
  return sortByDateDesc(state.orders.filter(o => o.status === 'advance'));
}
function soldOrders(){
  return sortByDateDesc(state.orders.filter(o => o.status !== 'advance' && Number(o.saleAmount || 0) > 0));
}
function unsoldOrders(){
  return sortByDateDesc(state.orders.filter(o => o.status !== 'advance' && Number(o.saleAmount || 0) <= 0));
}
function todaySales(){
  const today = new Date().toISOString().slice(5,10);
  return soldOrders().filter(s=>String(s.date).includes(today)).reduce((a,b)=>a+Number(b.saleAmount||0),0);
}
function monthSales(){
  return soldOrders().reduce((a,b)=>a+Number(b.saleAmount||0),0);
}
function totalProfit(){
  return soldOrders().reduce((a,b)=>a+Number(b.profit||0),0);
}
function currentMonthProfit(){
  const currentMonth = new Date().toISOString().slice(5,7);
  return soldOrders().filter(s => String(s.date || '').slice(0,2) === currentMonth).reduce((a,b)=>a+Number(b.profit||0),0);
}
function monthProfit(){
  return totalProfit();
}
function tradeinList(){
  return sortByDateDesc(state.tradeinOrders || []);
}
function soldTradeinOrders(){
  return sortByDateDesc((state.tradeinOrders || []).filter(o => !!o.dealDone));
}
function totalPrincipal(){
  return soldOrders().reduce((a,b)=>{
    return a + Number(b.orderAmount||0) + Number(b.rebate||0) - Number(b.freight||0);
  },0);
}
function profitRate(){
  const principal = totalPrincipal();
  if(principal <= 0) return '0.00';
  return (totalProfit() / principal * 100).toFixed(2);
}

function lossAmount(){
  return soldOrders().reduce((sum, order) => {
    const profit = Number(order.profit || 0);
    return profit < 0 ? sum + Math.abs(profit) : sum;
  }, 0);
}
function yesterdayProfit(){
  const d = new Date();
  d.setDate(d.getDate() - 1);

let noticeTickerTimer = null;
function stopNoticeTicker(){
  if(noticeTickerTimer){
    clearTimeout(noticeTickerTimer);
    noticeTickerTimer = null;
  }
}
function startNoticeTicker(){
  stopNoticeTicker();
  const viewport = document.getElementById('noticeMarquee');
  const wrap = document.getElementById('noticeLaneWrap');
  const laneA = document.getElementById('noticeLaneA');
  const laneB = document.getElementById('noticeLaneB');
  if(!viewport || !wrap || !laneA || !laneB) return;

  const texts = getResolvedNoticeTexts();
  if(!texts.length){
    laneA.textContent = '';
    laneB.textContent = '';
    return;
  }

  let activeLane = laneA;
  let standbyLane = laneB;
  let index = 0;
  let loopCount = 0;

  laneA.style.top = '0px';
  laneB.style.top = '20px';
  wrap.style.transform = 'translateY(0)';
  laneA.textContent = texts[0] || '';
  laneB.textContent = texts[1] || texts[0] || '';

  function runCurrent(){
    const text = texts[index] || '';
    activeLane.textContent = text;
    activeLane.style.transition = 'none';
    const viewportWidth = viewport.clientWidth || 1;
    const textWidth = activeLane.scrollWidth || 1;
    const startX = -textWidth - 12;
    const endX = viewportWidth + 12;
    activeLane.style.transform = 'translateX(' + startX + 'px)';
    requestAnimationFrame(function(){
      const distance = endX - startX;
      const duration = Math.max(4800, Math.min(9000, distance * 12));
      activeLane.style.transition = 'transform ' + duration + 'ms linear';
      activeLane.style.transform = 'translateX(' + endX + 'px)';
      noticeTickerTimer = setTimeout(function(){
        loopCount += 1;
        if(loopCount < 2){
          runCurrent();
          return;
        }
        loopCount = 0;
        index = (index + 1) % texts.length;
        standbyLane.textContent = texts[index] || '';
        standbyLane.style.transition = 'none';
        standbyLane.style.transform = 'translateX(' + (-((standbyLane.scrollWidth || 1) + 12)) + 'px)';
        wrap.style.transition = 'transform .12s ease';
        wrap.style.transform = 'translateY(-20px)';
        noticeTickerTimer = setTimeout(function(){
          const temp = activeLane;
          activeLane = standbyLane;
          standbyLane = temp;
          wrap.style.transition = 'none';
          wrap.style.transform = 'translateY(0)';
          activeLane.style.top = '0px';
          standbyLane.style.top = '20px';
          runCurrent();
        }, 100);
      }, duration);
    });
  }

  runCurrent();
}

function normalizeDate(v){
  if(!v) return new Date().toISOString().slice(5,10);
  if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v.slice(5);

}

function calcProfit(orderAmount, rebate, freight, saleAmount){
  const sale = Number(saleAmount||0);
  if(sale <= 0) return 0;
  return sale - Number(orderAmount||0) - Number(rebate||0) - Number(freight||0);
}
function calcTradeinActualCost(newMachinePrice, oldMachinePrice, recyclePrice, refundPrice){
  return Number(newMachinePrice||0) - Number(recyclePrice||0) + Number(oldMachinePrice||0) + Number(refundPrice||0);
}
function calcTradeinProfit(newMachinePrice, oldMachinePrice, recyclePrice, refundPrice, salePrice){
  return Number(salePrice||0) - calcTradeinActualCost(newMachinePrice, oldMachinePrice, recyclePrice, refundPrice);
}

function collectBuyerSuggestions(){
  const set = new Set();
  const list = [];
  state.orders.forEach(function(order){
    const value = normalizeSuggestionText(order && order.buyer);
    if(!value) return;
    const key = value.toLowerCase();
    if(set.has(key)) return;
    set.add(key);
    list.push(value);
  });
  return list;
}

function collectProductSuggestions(){
  const set = new Set();
  const list = [];
  state.products.forEach(function(product){
    const value = normalizeSuggestionText(product && product.name);
    if(!value) return;
    const key = value.toLowerCase();
    if(set.has(key)) return;
    set.add(key);
    list.push(value);
  });
  state.orders.forEach(function(order){
    const value = normalizeSuggestionText(order && order.product);
    if(!value) return;
    const key = value.toLowerCase();
    if(set.has(key)) return;
    set.add(key);
    list.push(value);
  });

}

function matchSuggestions(keyword, source){
  const q = normalizeSuggestionText(keyword).toLowerCase();
  const list = Array.isArray(source) ? source.slice() : [];
  if(!q) return list.slice(0, 8);
  const starts = [];
  const includes = [];
  list.forEach(function(item){
    const text = String(item || '');
    const lower = text.toLowerCase();
    if(lower.startsWith(q)) starts.push(text);
    else if(lower.includes(q)) includes.push(text);
  });
  return starts.concat(includes).slice(0, 8);
}

function closeAutocompletePanel(panel){

function renderAutocompletePanel(panel, items, onPick){
  if(!panel) return;
  if(!items.length){
    closeAutocompletePanel(panel);
    return;
  }
  panel.innerHTML = items.map(function(item, index){
    return '<div class="autocomplete-item' + (index === 0 ? ' active' : '') + '" data-value="' + escapeHtml(item) + '">' + escapeHtml(item) + '</div>';
  }).join('');
  panel.classList.add('show');
  Array.from(panel.querySelectorAll('.autocomplete-item')).forEach(function(el){
    el.addEventListener('mousedown', function(e){
      e.preventDefault();
      onPick(el.getAttribute('data-value') || '');
    });
  });
}

function attachAutocomplete(input, panel, sourceGetter, afterPick){
  if(!input || !panel) return;
  let currentItems = [];
  let activeIndex = 0;
  let suppressRefresh = false;

  function pick(value){
    suppressRefresh = true;
    input.value = value;
    closeAutocompletePanel(panel);
    input.dispatchEvent(new Event('input', {bubbles:true}));
    if(typeof afterPick === 'function') afterPick(value);
    setTimeout(function(){
      suppressRefresh = false;
      closeAutocompletePanel(panel);
    }, 0);
  }

  function refresh(){
    if(suppressRefresh){
      closeAutocompletePanel(panel);
      return;
    }
    currentItems = matchSuggestions(input.value, sourceGetter());
    activeIndex = 0;
    renderAutocompletePanel(panel, currentItems, pick);
  }

  input.addEventListener('focus', refresh);
  input.addEventListener('input', refresh);
  input.addEventListener('keydown', function(e){
    if(!panel.classList.contains('show') || !currentItems.length) return;
    if(e.key === 'ArrowDown'){
      e.preventDefault();
      activeIndex = (activeIndex + 1) % currentItems.length;
    }else if(e.key === 'ArrowUp'){
      e.preventDefault();
      activeIndex = (activeIndex - 1 + currentItems.length) % currentItems.length;
    }else if(e.key === 'Enter'){
      e.preventDefault();
      pick(currentItems[activeIndex]);
      return;
    }else if(e.key === 'Escape'){
      closeAutocompletePanel(panel);
      return;
    }else{
      return;
    }
    Array.from(panel.querySelectorAll('.autocomplete-item')).forEach(function(el, index){
      el.classList.toggle('active', index === activeIndex);
    });
  });
  input.addEventListener('blur', function(){
    setTimeout(function(){ closeAutocompletePanel(panel); }, 120);
  });
}

function getPagedList(list, page, pageSize){
  const safeList = Array.isArray(list) ? list : [];
  const size = Math.max(1, Number(pageSize || 50));
  const totalPages = Math.max(1, Math.ceil(safeList.length / size));
  const currentPage = Math.min(Math.max(1, Number(page || 1)), totalPages);
  const start = (currentPage - 1) * size;
  return {
    list: safeList.slice(start, start + size),
    page: currentPage,
    totalPages,
    total: safeList.length,
    pageSize: size,
  };
}

function updateOrderField(orderId, field, value){
  const order = state.orders.find(o => o.id === orderId);
  if(!order) return;
  if(['orderAmount','rebate','freight','saleAmount'].includes(field)){
    order[field] = value === '' ? 0 : Number(value || 0);
    order.profit = calcProfit(order.orderAmount, order.rebate, order.freight, order.saleAmount);
  }else{
    order[field] = value;
  }
  persist();
}

function triggerTapHaptic(){
  try{
    if(window.AndroidBridge && typeof AndroidBridge.tapHaptic === 'function'){
      AndroidBridge.tapHaptic();
      return;
    }
    if(window.AndroidBridge && typeof AndroidBridge.vibrate === 'function'){
      AndroidBridge.vibrate(10);
      return;
    }
    if(navigator.vibrate) navigator.vibrate(10);
  }catch(e){}
}

function tapMenuCard(el, action){
  if(!el) return;
  el.classList.add('pressed');
  triggerTapHaptic();
  setTimeout(function(){
    try{
      if(action) (new Function(action))();
    }finally{
      setTimeout(function(){
        el.classList.remove('pressed');
      }, 120);
    }
  }, 90);
}


function animateHomeStats(){
  requestAnimationFrame(() => {
    document.querySelectorAll('.hero .stat .value, .hero .big').forEach(el => {
      const raw = el.getAttribute('data-value');
      if(raw === null) return;
      if(!state.homeProfitVisible && el.getAttribute('data-sensitive') === 'true'){
        const isPercentHidden = el.getAttribute('data-suffix') === '%';
        el.textContent = isPercentHidden ? '**.**%' : '****';
        return;
      }
      const end = Number(raw || 0);
      const isPercent = el.getAttribute('data-suffix') === '%';
      const duration = 700;
      const start = performance.now();
      function frame(now){
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = end * eased;
        el.classList.add('animating');
        el.textContent = isPercent ? current.toFixed(2) + '%' : current.toFixed(2);
        if(progress < 1){
          requestAnimationFrame(frame);
        }else{
          el.textContent = isPercent ? end.toFixed(2) + '%' : end.toFixed(2);
        }
      }
      requestAnimationFrame(frame);
    });
  });
}

function addSale(form){
  const fd = new FormData(form);
  const name = fd.get('product');
  const qty = Number(fd.get('qty')||0);
  const product = state.products.find(p=>p.name===name);
  if(!product) return alert('请选择商品');
  if(qty<=0) return alert('数量必须大于0');
  if(product.stock < qty) return alert('库存不足');
  product.stock -= qty;
  const total = qty * product.price;
  const costTotal = qty * product.cost;
  state.sales.unshift({
    product:name, qty, total, costTotal,
    date:new Date().toISOString().slice(0,10)
  });
  persist(); showToast('销售已保存'); setTab('detail');
}

function getLocalDateKey(dateObj){
  const d = dateObj instanceof Date ? dateObj : new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function getRecentDateKeys(days){
  const total = Math.max(1, Number(days || 7));
  const list = [];
  const base = new Date();
  base.setHours(0, 0, 0, 0);
  for(let i = total - 1; i >= 0; i -= 1){
    const d = new Date(base);
    d.setDate(base.getDate() - i);
    list.push(getLocalDateKey(d));
  }
  return list;
}

function normalizeLoginStats(raw){
  const daily = raw && typeof raw === 'object' && raw.daily && typeof raw.daily === 'object' ? raw.daily : {};
  const nextDaily = {};
  Object.keys(daily).forEach(function(key){
    const item = daily[key] || {};
    nextDaily[key] = {
      successCount: Math.max(0, Number(item.successCount || 0)),
      lastAt: Number(item.lastAt || 0)
    };
  });
  return { daily: nextDaily };
}

function persistLoginStats(){
  state.loginStats = normalizeLoginStats(state.loginStats);
  store.save('jxc_login_stats', state.loginStats);
}

function recordLoginSuccess(){
  state.loginStats = normalizeLoginStats(state.loginStats);
  const key = getLocalDateKey();
  const daily = state.loginStats.daily || (state.loginStats.daily = {});
  const current = daily[key] || { successCount: 0, lastAt: 0 };
  daily[key] = {
    successCount: Number(current.successCount || 0) + 1,
    lastAt: Date.now()
  };
  persistLoginStats();
}

function ensureTodayLoginRecorded(){
  state.loginStats = normalizeLoginStats(state.loginStats);
  const key = getLocalDateKey();
  const daily = state.loginStats.daily || (state.loginStats.daily = {});
  const current = daily[key] || { successCount: 0, lastAt: 0 };
  if(Number(current.successCount || 0) > 0) return false;
  daily[key] = {
    successCount: 1,
    lastAt: Date.now()
  };
  persistLoginStats();
  return true;
}


function getTodayLoginStatMeta(){
  state.loginStats = normalizeLoginStats(state.loginStats);
  const key = getLocalDateKey();
  const daily = state.loginStats.daily || {};
  const item = daily[key] || null;
  return {
    dateKey: key,
    successCount: Number(item && item.successCount || 0),
    lastAt: Number(item && item.lastAt || 0)
  };
}

async function upsertDailyUniqueLoginStat(dateKey, lastAt){
  if(!supa || !authState.user || !dateKey) return false;
  try{
    const payload = {
      user_id: String(authState.user.id || ''),
      date_key: String(dateKey || ''),
      last_at: Number(lastAt || Date.now()),
      updated_at: new Date().toISOString()
    };
    const { error } = await supa.from('login_daily_stats').upsert(payload, { onConflict: 'user_id,date_key' });
    if(error) throw error;
    return true;
  }catch(err){
    console.warn('login_daily_stats upsert skipped', err);
    return false;
  }
}

async function syncTodayLoginStatToDailyTable(){
  const meta = getTodayLoginStatMeta();
  if(meta.successCount <= 0) return false;
  return await upsertDailyUniqueLoginStat(meta.dateKey, meta.lastAt || Date.now());
}

function emptyAdminLoginStats(){
  const dates = getRecentDateKeys(7);
  return {
    todayCount: 0,
    avg7: 0,
    daily: dates.map(function(date){ return { date: date, count: 0 }; }),
    updatedAt: 0
  };
}


async function refreshAdminLoginStats(showMsg){
  if(!authState.isAdmin || !supa) return emptyAdminLoginStats();
  const dates = getRecentDateKeys(7);
  const makeDaily = function(countMap){
    return dates.map(function(date){ return { date: date, count: Number(countMap[date] || 0) }; });
  };
  try{
    const countMap = {};
    dates.forEach(function(date){ countMap[date] = 0; });

    let from = 0;
    const pageSize = 1000;
    let usedDailyTable = false;
    while(true){
      const { data, error } = await supa.from('login_daily_stats').select('user_id,date_key').in('date_key', dates).range(from, from + pageSize - 1);
      if(error) throw error;
      const rows = Array.isArray(data) ? data : [];
      rows.forEach(function(row){
        const key = String(row && row.date_key || '');
        if(key && Object.prototype.hasOwnProperty.call(countMap, key)){
          countMap[key] += 1;
        }
      });
      usedDailyTable = true;
      if(rows.length < pageSize) break;
      from += pageSize;
    }

    const daily = makeDaily(countMap);
    const todayCount = daily.length ? Number(daily[daily.length - 1].count || 0) : 0;
    const avg7 = daily.length ? (daily.reduce(function(sum, item){ return sum + Number(item.count || 0); }, 0) / daily.length) : 0;
    state.adminLoginStats = {
      todayCount: todayCount,
      avg7: avg7,
      daily: daily,
      updatedAt: Date.now(),
      source: usedDailyTable ? 'login_daily_stats' : 'app_state_user'
    };
    if(showMsg) showToast('登录统计已刷新');
    return state.adminLoginStats;
  }catch(primaryErr){
    try{
      const countMap = {};
      dates.forEach(function(date){ countMap[date] = 0; });
      let from = 0;
      const pageSize = 1000;
      while(true){
        const { data, error } = await supa.from('app_state_user').select('id,data').range(from, from + pageSize - 1);
        if(error) throw error;
        const rows = Array.isArray(data) ? data : [];
        rows.forEach(function(row){
          let payload = row && row.data && typeof row.data === 'object' ? row.data : null;
          if(payload && payload.data && typeof payload.data === 'object') payload = payload.data;
          const stats = payload && payload.loginStats && payload.loginStats.daily && typeof payload.loginStats.daily === 'object' ? payload.loginStats.daily : null;
          if(!stats) return;
          dates.forEach(function(date){
            const item = stats[date];
            if(item && Number(item.successCount || 0) > 0) countMap[date] += 1;
          });
        });
        if(rows.length < pageSize) break;
        from += pageSize;
      }
      const daily = makeDaily(countMap);
      const todayCount = daily.length ? Number(daily[daily.length - 1].count || 0) : 0;
      const avg7 = daily.length ? (daily.reduce(function(sum, item){ return sum + Number(item.count || 0); }, 0) / daily.length) : 0;
      state.adminLoginStats = {
        todayCount: todayCount,
        avg7: avg7,
        daily: daily,
        updatedAt: Date.now(),
        source: 'app_state_user'
      };
      if(showMsg) showToast('登录统计已刷新');
      return state.adminLoginStats;
    }catch(err){
      console.error(primaryErr);
      console.error(err);
      state.adminLoginStats = state.adminLoginStats || emptyAdminLoginStats();
      if(showMsg) showToast('登录统计刷新失败');
      return state.adminLoginStats;
    }
  }
}

function addTradeinOrder(form){
  const fd = new FormData(form);
  const newMachinePrice = Number(fd.get('newMachinePrice')||0);
  const oldMachinePrice = Number(fd.get('oldMachinePrice')||0);
  const recyclePrice = Number(fd.get('recyclePrice')||0);
  const refundPrice = Number(fd.get('refundPrice')||0);
  const salePrice = Number(fd.get('salePrice')||0);
  state.tradeinOrders.unshift({
    id:id(),
    date: normalizeDate(fd.get('date') || new Date().toISOString().slice(0,10)),
    buyer: fd.get('buyer'),
    newMachinePrice,
    oldMachinePrice,
    recyclePrice,
    refundPrice,
    salePrice,
    profit: calcTradeinProfit(newMachinePrice, oldMachinePrice, recyclePrice, refundPrice, salePrice),
    trackingNo: fd.get('trackingNo'),
    remark: fd.get('remark'),
    dealDone: false
  });
  persist();
  form.reset();
  const dateInput = form.querySelector('[name="date"]');
  if(dateInput) dateInput.value = new Date().toISOString().slice(0,10);
  render();
  showNiceModal('保存成功', '以旧换新记录已保存', '✓');
}

function filteredTradeinOrders(){
  const q = state.orderSearch.trim().toLowerCase();
  const list = tradeinList();
  if(!q) return list;
  return list.filter(function(o){
    return [o.date,o.buyer,o.trackingNo,o.remark].join(' ').toLowerCase().includes(q);
  });
}

function updateTradeinField(orderId, field, value){
  const order = (state.tradeinOrders || []).find(function(item){ return item.id === orderId; });
  if(!order) return;
  if(['newMachinePrice','oldMachinePrice','recyclePrice','refundPrice','salePrice'].includes(field)){
    order[field] = value === '' ? 0 : Number(value || 0);
    order.profit = calcTradeinProfit(order.newMachinePrice, order.oldMachinePrice, order.recyclePrice, order.refundPrice, order.salePrice);
  }else{
    order[field] = value;
  }
  persist();
}

function markTradeinDeal(orderId){
  const order = (state.tradeinOrders || []).find(function(item){ return item.id === orderId; });
  if(!order || order.dealDone) return;
  order.dealDone = true;

function persistSelectedOrderIds(){
  store.save('jxc_selected_order_ids', state.selectedOrderIds || []);
}

function isOrderSelected(orderId){
  return Array.isArray(state.selectedOrderIds) && state.selectedOrderIds.includes(orderId);
}

function getCurrentSelectionScopeKey(){
  if(state.tab === 'sale' || state.tab === 'advance' || state.tab === 'detail') return state.tab;
  return '';
}

function getVisibleOrdersByScope(scopeKey){
  if(scopeKey === 'sale') return filteredOrders(unsoldOrders());
  if(scopeKey === 'advance') return filteredOrders(advanceOrders());
  if(scopeKey === 'detail') return filteredOrders(soldOrders());
  return [];
}

function updateBatchSelectionUI(scopeKey){
  const currentScope = scopeKey || getCurrentSelectionScopeKey();
  if(!currentScope) return;
  const list = getVisibleOrdersByScope(currentScope);
  const selectedCount = countSelectedInList(list);
  const countEl = document.getElementById('batchSelectedCount');
  if(countEl) countEl.textContent = '已选 ' + selectedCount + ' / ' + list.length + ' 笔';
  const headCheckbox = document.getElementById('selectAllCheckbox');
  if(headCheckbox){
    const allChecked = !!list.length && selectedCount === list.length;
    headCheckbox.checked = allChecked;
    headCheckbox.indeterminate = selectedCount > 0 && selectedCount < list.length;
  }
}

function toggleOrderSelection(orderId, checked){
  const set = new Set(Array.isArray(state.selectedOrderIds) ? state.selectedOrderIds : []);
  if(checked) set.add(orderId);
  else set.delete(orderId);
  state.selectedOrderIds = Array.from(set);
  persistSelectedOrderIds();
  updateBatchSelectionUI();
}

function toggleSelectAllOrders(scopeKey, checked){
  const list = getVisibleOrdersByScope(scopeKey);
  const set = new Set(Array.isArray(state.selectedOrderIds) ? state.selectedOrderIds : []);
  list.forEach(function(order){
    if(checked) set.add(order.id);
    else set.delete(order.id);
  });
  state.selectedOrderIds = Array.from(set);
  persistSelectedOrderIds();
  const idSet = new Set(list.map(function(order){ return order.id; }));
  document.querySelectorAll('tr[data-order-id]').forEach(function(row){
    const orderId = row.getAttribute('data-order-id');
    if(!idSet.has(orderId)) return;
    const checkbox = row.querySelector('.order-check');
    if(checkbox) checkbox.checked = !!checked;
  });
  updateBatchSelectionUI(scopeKey);
}

function countSelectedInList(list){
  const ids = new Set(Array.isArray(state.selectedOrderIds) ? state.selectedOrderIds : []);
  return (Array.isArray(list) ? list : []).filter(function(item){ return ids.has(item.id); }).length;
}

function openBatchTrackingModal(scopeKey){
  const visibleList = filteredOrders(scopeKey === 'sale' ? unsoldOrders() : (scopeKey === 'advance' ? advanceOrders() : soldOrders()));
  const selected = visibleList.filter(function(item){ return isOrderSelected(item.id); });
  if(!selected.length){
    showToast('请先勾选订单');
    return;
  }
  openAccountModal({
    title:'批量填快递单号',
    desc:'可输入 1 个或多个单号。多个单号支持按换行、空格、逗号分隔；若只填 1 个，则会批量填到全部选中订单。',
    confirmText:'立即填入',
    loadingText:'处理中...',
    fields:[
      {key:'trackingNos', label:'快递单号', type:'textarea', placeholder:'一行一个，或直接粘贴多个单号'}
    ],
    onSubmit: async function(values, setMsg, close){
      const raw = String(values.trackingNos || '').trim();
      if(!raw){ setMsg('请输入快递单号'); return; }
      const numbers = raw.split(/[\n,，\s]+/).map(function(item){ return String(item || '').trim(); }).filter(Boolean);
      if(!numbers.length){ setMsg('请输入有效快递单号'); return; }
      if(numbers.length !== 1 && numbers.length !== selected.length){
        setMsg('单号数量需等于选中订单数，或只填 1 个');
        return;
      }
      selected.forEach(function(order, index){
        order.trackingNo = numbers.length === 1 ? numbers[0] : numbers[index];
      });
      persist();
      close();
      showNiceModal('批量填写成功', '已更新 ' + selected.length + ' 笔订单的快递单号', '✓');
    }
  });
}

function openBatchSaleAmountModal(){
  const visibleList = filteredOrders(unsoldOrders());
  const selected = visibleList.filter(function(item){ return isOrderSelected(item.id); });
  if(!selected.length){
    showToast('请先勾选订单');
    return;
  }
  openAccountModal({
    title:'批量填售出金额',
    desc:'会把选中订单批量写入售出金额，并自动计算利润；保存后这些订单会从未售出进入报表。',
    confirmText:'立即填入',
    loadingText:'处理中...',
    fields:[
      {key:'saleAmount', label:'售出金额', type:'number', placeholder:'请输入售出金额'}
    ],
    onSubmit: async function(values, setMsg, close){
      const raw = String(values.saleAmount || '').trim();
      if(!raw){ setMsg('请输入售出金额'); return; }
      const saleAmount = Number(raw);
      if(!Number.isFinite(saleAmount) || saleAmount <= 0){
        setMsg('售出金额必须大于 0');
        return;
      }
      selected.forEach(function(order){
        order.saleAmount = saleAmount;
        order.profit = calcProfit(order.orderAmount, order.rebate, order.freight, saleAmount);
      });
      const removeIds = new Set(selected.map(function(order){ return order.id; }));
      state.selectedOrderIds = (state.selectedOrderIds || []).filter(function(id){ return !removeIds.has(id); });
      persistSelectedOrderIds();
      persist();
      close();
      render();
      showNiceModal('批量填写成功', '已更新 ' + selected.length + ' 笔订单的售出金额，并转入报表', '✓');
    }
  });
}

function normalizeImportedKey(key){
  return String(key || '').replace(/\s+/g,'').trim();
}

function mapImportedOrder(row){
  const raw = {};
  Object.keys(row || {}).forEach(key => {
    raw[normalizeImportedKey(key)] = row[key];
  });
  const dateValue = raw['日期'] ?? raw['下单日期'] ?? raw['时间'] ?? '';
  const orderAmount = Number(raw['下单金额'] ?? raw['进价'] ?? 0);
  const rebate = Number(raw['返款'] ?? raw['退款'] ?? 0);
  const freight = Number(raw['运费'] ?? raw['邮费'] ?? 0);
  const saleAmount = Number(raw['售出金额'] ?? raw['卖价'] ?? 0);
  const profitCell = raw['利润'];
  const statusValue = String(raw['订单状态'] ?? raw['状态'] ?? '').trim();
  return {
    id: id(),
    status: statusValue === 'advance' || statusValue === '垫付' || statusValue === '垫付中心' ? 'advance' : 'normal',
    date: normalizeDate(dateValue),
    buyer: String(raw['下单人'] ?? raw['客户'] ?? ''),
    product: String(raw['产品'] ?? raw['商品'] ?? ''),
    orderAmount,
    rebate,
    freight,
    saleAmount,
    profit: profitCell === undefined || profitCell === null || profitCell === '' ? calcProfit(orderAmount, rebate, freight, saleAmount) : Number(profitCell || 0),
    trackingNo: String(raw['物流单号'] ?? raw['单号'] ?? ''),
    remark: String(raw['备注'] ?? raw['说明'] ?? '')
  };
}

function handleImportOrders(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  if(typeof XLSX === 'undefined'){
    showToast('导入组件加载失败，请检查网络后重试');
    event.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type:'array'});
      const sheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      const imported = rows
        .map(mapImportedOrder)
        .filter(item => item.date || item.buyer || item.product || item.orderAmount || item.saleAmount || item.remark || item.trackingNo);
      if(!imported.length){
        showToast('未识别到可导入的订单数据');
        event.target.value = '';
        return;
      }
      saveBackupSnapshot('before-import-orders', true);
      state.orders = imported;
      persist();
      setTab('detail');
      showToast('已成功导入 ' + imported.length + ' 条订单');
    }catch(err){
      console.error(err);
      showToast('导入失败，请确认文件格式正确');
    }
    event.target.value = '';
  };
  reader.readAsArrayBuffer(file);
}

function exportOrders(){
  if(typeof XLSX === 'undefined'){
    showToast('导出组件加载失败，请检查网络后重试');
    return;
  }
  const rows = state.orders.map(o => ({
    '订单状态': o.status === 'advance' ? '垫付' : '普通',
    '日期': o.date,
    '下单人': o.buyer,
    '产品': o.product,
    '下单金额': Number(o.orderAmount || 0),
    '返款': Number(o.rebate || 0),
    '运费': Number(o.freight || 0),
    '售出金额': Number(o.saleAmount || 0),
    '利润': Number(o.profit || 0),
    '物流单号': o.trackingNo || '',
    '备注': o.remark || ''
  }));
  const worksheet = XLSX.utils.json_to_sheet(rows.length ? rows : [{
    '订单状态':'','日期':'','下单人':'','产品':'','下单金额':'','返款':'','运费':'','售出金额':'','利润':'','物流单号':'','备注':''
  }]);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, '订单利润数据');
  const tradeinRows = (state.tradeinOrders || []).map(o => ({
    '日期': o.date,
    '下单人': o.buyer,
    '新机价格': Number(o.newMachinePrice || 0),
    '旧机价格': Number(o.oldMachinePrice || 0),
    '回收返现': Number(o.recyclePrice || 0),
    '返款': Number(o.refundPrice || 0),
    '售出价格': Number(o.salePrice || 0),
    '利润': Number(o.profit || 0),
    '快递单号': o.trackingNo || '',
    '备注': o.remark || ''
  }));
  const tradeinSheet = XLSX.utils.json_to_sheet(tradeinRows.length ? tradeinRows : [{
    '日期':'','下单人':'','新机价格':'','旧机价格':'','回收返现':'','返款':'','售出价格':'','利润':'','快递单号':'','备注':''
  }]);
  XLSX.utils.book_append_sheet(workbook, tradeinSheet, '换新订单');
  const fileName = '订单利润数据导出.xlsx';
  const mimeType = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';

  if(window.AndroidBridge && typeof AndroidBridge.saveBase64File === 'function'){
    try{
      const base64Data = XLSX.write(workbook, { bookType:'xlsx', type:'base64' });
      const ok = AndroidBridge.saveBase64File(fileName, mimeType, base64Data);
      if(ok){
        showToast('导出成功，已保存到下载目录');
        return;
      }
      showToast('安卓导出失败，已尝试浏览器方式继续导出');
    }catch(err){
      console.error(err);
      showToast('安卓导出桥接失败，已尝试浏览器方式继续导出');
    }
  }

  try{
    XLSX.writeFile(workbook, fileName);
    showToast('已触发浏览器导出');
  }catch(err){
    console.error(err);
    showToast('导出失败，请稍后重试');
  }
}

let searchIsComposing = false;

function setOrderSearch(v, evt){
  state.orderSearch = v;
  if(state.tab === 'detail'){
    state.reportPage = 1;
    state.reportTradeinPage = 1;
    store.save('jxc_report_page', 1);
    store.save('jxc_report_tradein_page', 1);
  }
  if(searchIsComposing || (evt && evt.isComposing)) return;

  if(searchRenderTimer) clearTimeout(searchRenderTimer);
  const active = document.activeElement;
  const shouldRestoreFocus = !!(active && active.classList && active.classList.contains('search-input'));

  searchRenderTimer = setTimeout(function(){
    render();
    if(shouldRestoreFocus){
      const input = document.querySelector('.search-input');
      if(input){

        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px">
          <button class="btn primary" type="button" onclick="bootApp(true)">重新加载页面</button>

}

async function ensureZXingLoaded(){
  if(window.ZXingBrowser && window.ZXingBrowser.BrowserMultiFormatReader){
    return window.ZXingBrowser;
  }
  if(zxingLoaderPromise) return zxingLoaderPromise;
  const cdnList = [
    'https://cdn.bootcdn.net/ajax/libs/zxing-js/browser/0.1.5/zxing-browser.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/zxing-js/browser/0.1.5/zxing-browser.min.js',
    'https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/zxing-browser.min.js',
    'https://fastly.jsdelivr.net/npm/@zxing/browser@0.1.5/umd/zxing-browser.min.js',
    'https://unpkg.com/@zxing/browser@0.1.5/umd/zxing-browser.min.js'
  ];
  zxingLoaderPromise = new Promise(async function(resolve, reject){
    for(const src of cdnList){
      try{
        await new Promise(function(ok, fail){
          const old = document.querySelector('script[data-zxing-loader="1"][src="' + src + '"]');
          if(old){
            if(window.ZXingBrowser) return ok();
            old.addEventListener('load', ok, {once:true});
            old.addEventListener('error', fail, {once:true});
            return;
          }
          const script = document.createElement('script');
          script.src = src;
          script.async = true;
          script.dataset.zxingLoader = '1';
          script.onload = ok;
          script.onerror = fail;
          document.head.appendChild(script);
        });
        if(window.ZXingBrowser && window.ZXingBrowser.BrowserMultiFormatReader){
          resolve(window.ZXingBrowser);
          return;
        }
      }catch(err){}
    }
    reject(new Error('ZXing load failed'));
  });
  return zxingLoaderPromise;
}

    const usableFormats = detectorFormats().filter(function(f){ return formats.includes(f); });
    return new BarcodeDetector({formats: usableFormats.length ? usableFormats : detectorFormats()});
  }catch(err){

}

function extractNativeScanCode(result){
  if(result == null) return '';
  if(typeof result === 'string') return result.trim();
  if(typeof result === 'number') return String(result);
  const keys = ['code','text','rawValue','result','value','content','data','qr','barcode'];
  for(const key of keys){
    if(result && result[key] != null){
      return String(result[key]).trim();
    }
  }
  return '';
}

function getNativeScanInvoker(){
  try{
    if(window.AndroidBridge){
      const bridge = window.AndroidBridge;
      const candidates = [
        'scanQRCode','scanQrCode','scanQR','scanCode','startScan','startQrScan',
        'startQRCodeScan','openScanner','openQrScanner','openQRCodeScanner'
      ];
      for(const name of candidates){
        if(typeof bridge[name] === 'function'){
          return {platform:'android', type:'bridge', name, invoke:function(){ return bridge[name](); }};
        }
      }
    }
  }catch(err){}
  try{
    if(window.webkit && window.webkit.messageHandlers){
      const handlers = window.webkit.messageHandlers;
      const names = ['qrScan','scanQRCode','scanCode','nativeScan','openScanner'];
      for(const name of names){
        if(handlers[name] && typeof handlers[name].postMessage === 'function'){
          return {platform:'ios', type:'handler', name, invoke:function(){ return handlers[name].postMessage({action:'scan'}); }};
        }
      }
    }
  }catch(err){}
  return null;
}

function hasNativeAppScanner(){
  return !!getNativeScanInvoker();
}

async function tryStartNativeAppScan(session){
  const invoker = getNativeScanInvoker();
  if(!invoker) return false;
  window.__pendingNativeScanSession = session;
  if(session && session.statusText){

  }
  try{
    const direct = await invoker.invoke();
    const code = extractNativeScanCode(direct);
    if(code){

    }

  }catch(err){
    console.error(err);
    if(session && session.statusText){

    return false;
  }
}

async function fileToImage(file){
  if(!file) return null;
  const img = new Image();
  const url = URL.createObjectURL(file);
  await new Promise(function(resolve, reject){
    img.onload = resolve;
    img.onerror = reject;
    img.src = url;
  });
  img.dataset.objectUrl = url;
  return img;
}

function releaseImage(img){
  try{
    const url = img && img.dataset ? img.dataset.objectUrl : '';
    if(url) URL.revokeObjectURL(url);
  }catch(e){}
}

async function fileToScanCanvas(file){
  if(!file) return null;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d', {willReadFrequently:true});
  if(!ctx) throw new Error('canvas not supported');

  if(window.createImageBitmap){
    try{
      const bitmap = await createImageBitmap(file, {imageOrientation:'from-image'});
      const maxSide = 1800;
      const ratio = Math.min(1, maxSide / Math.max(bitmap.width || 1, bitmap.height || 1));
      canvas.width = Math.max(1, Math.round((bitmap.width || 1) * ratio));
      canvas.height = Math.max(1, Math.round((bitmap.height || 1) * ratio));
      ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
      if(bitmap.close) bitmap.close();
      return canvas;
    }catch(err){}
  }

  const img = await fileToImage(file);
  try{
    const width = img.naturalWidth || img.width || 1;
    const height = img.naturalHeight || img.height || 1;
    const maxSide = 1800;
    const ratio = Math.min(1, maxSide / Math.max(width, height));
    canvas.width = Math.max(1, Math.round(width * ratio));
    canvas.height = Math.max(1, Math.round(height * ratio));
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    return canvas;
  }finally{
    releaseImage(img);
  }
}

async function decodeCanvasWithZXing(canvas){
  if(!canvas) return '';
  const ZXingLib = await ensureZXingLoaded();
  const reader = new ZXingLib.BrowserMultiFormatReader();
  let img = null;
  try{
    img = new Image();
    await new Promise(function(resolve, reject){
      img.onload = resolve;
      img.onerror = reject;
      img.src = canvas.toDataURL('image/jpeg', 0.92);
    });
    const result = await reader.decodeFromImageElement(img);
    return result && result.text ? String(result.text).trim() : '';
  }finally{
    if(reader && reader.reset) reader.reset();
  }
}

async function recognizeCodeFromImageFile(file, detector){
  if(!file) return '';
  const canvas = await fileToScanCanvas(file);
  if(!canvas) return '';
  if(detector){
    try{
      const nativeResults = await detector.detect(canvas);
      if(nativeResults && nativeResults.length){
        return String(nativeResults[0].rawValue || '').trim();
      }
    }catch(err){}
  }
  return await decodeCanvasWithZXing(canvas);
}

function getUserMediaCompat(constraints){
  if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia){
    return navigator.mediaDevices.getUserMedia(constraints);
  }
  const legacy = navigator.getUserMedia || navigator.webkitGetUserMedia || navigator.mozGetUserMedia;
  if(!legacy){
    return Promise.reject(new Error('getUserMedia unavailable'));
  }
  return new Promise(function(resolve, reject){
    legacy.call(navigator, constraints, resolve, reject);
  });
}

async function beginLiveScan(session){
  if(!session) return;
  if(!((navigator.mediaDevices && navigator.mediaDevices.getUserMedia) || navigator.getUserMedia || navigator.webkitGetUserMedia || navigator.mozGetUserMedia)){
    showToast('当前浏览器不支持浏览器扫码，请改用APP原生扫码或拍照识别');
    return;
  }
  const status = session.statusText;
  try{
    if(status) status.textContent = '正在打开摄像头…';
    if(session.reader && session.reader.reset) session.reader.reset();
    if(session.stream){
      try{ session.stream.getTracks().forEach(function(track){ track.stop(); }); }catch(e){}
      session.stream = null;
    }
    const videoConstraints = {
      facingMode:{ideal:'environment'},
      width:{ideal:1920},
      height:{ideal:1080}
    };
    const stream = await getUserMediaCompat({
      video: videoConstraints,
      audio:false
    });
    session.stream = stream;
    session.video.srcObject = stream;
    await session.video.play();
    session.mode = 'live';
    session.manualPanel.hidden = true;
    session.video.hidden = false;
    session.viewfinder.hidden = false;
    session.liveBtn.classList.add('active');
    session.track = stream.getVideoTracks ? stream.getVideoTracks()[0] : null;
    const capabilities = session.track && session.track.getCapabilities ? session.track.getCapabilities() : null;
    if(session.track && session.track.applyConstraints && capabilities){
      const advanced = [];
      if(capabilities.focusMode && Array.isArray(capabilities.focusMode)){
        if(capabilities.focusMode.includes('continuous')) advanced.push({focusMode:'continuous'});
        else if(capabilities.focusMode.includes('single-shot')) advanced.push({focusMode:'single-shot'});
      }
      if(capabilities.zoom && typeof capabilities.zoom.min === 'number'){
        const baseZoom = Math.max(capabilities.zoom.min, 1);
        advanced.push({zoom: Math.min(baseZoom, capabilities.zoom.max || baseZoom)});
      }
      if(advanced.length){
        try{ await session.track.applyConstraints({advanced}); }catch(err){}
      }
    }
    session.usingNativeTorch = canUseNativeTorch();
    session.torchSupported = session.usingNativeTorch || !!(capabilities && capabilities.torch);
    session.torchOn = false;
    updateTorchButtonState(session);
    if(status) status.textContent = '请将二维码放入框内，保持 10-20 厘米距离并稍等自动对焦';

    if(session.detector){
      if(session.scanTimer) clearInterval(session.scanTimer);
      session.scanTimer = setInterval(async function(){
        if(!activeScanSession || activeScanSession !== session) return;
        if(session.paused || session.resultVisible) return;
        if(session.video.readyState < 2) return;
        try{
          const results = await session.detector.detect(session.video);
          if(!results || !results.length) return;
          handleDetectedCode(session, String(results[0].rawValue || '').trim());
        }catch(err){}
      }, 380);
      return;
    }

    const ZXingLib = await ensureZXingLoaded();
    if(session.reader && session.reader.reset) session.reader.reset();
    session.reader = new ZXingLib.BrowserMultiFormatReader();
    session.zxingControls = await session.reader.decodeFromVideoDevice(null, session.video, function(result, err, controls){
      if(controls) session.zxingControls = controls;
      if(result && result.text){
        handleDetectedCode(session, String(result.text || '').trim());
      }
    });
  }catch(err){
    console.error(err);
    session.liveBtn.classList.remove('active');
    if(status) status.textContent = '浏览器扫码打开失败，请改用APP原生扫码、拍照识别或相册识别';
    const name = err && err.name ? err.name : '';
    if(name === 'NotAllowedError'){
      showToast('摄像头权限被拒绝，请改用拍照识别或到系统设置中开启摄像头权限');
    }else if(name === 'NotFoundError'){

    }else{
      showToast('浏览器扫码打开失败，请改用拍照识别');
    }
  }
}

function handleDetectedCode(session, raw){
  raw = String(raw || '').trim();
  if(!raw || !session || session.resultVisible) return;
  const now = Date.now();
  if(raw === session.lastCode && now - session.lastAt < 1200) return;
  session.lastCode = raw;
  session.lastAt = now;
  session.resultVisible = true;
  session.paused = true;
  if(typeof session.onDetected === 'function') session.onDetected(raw);
  if(session.resultCode) session.resultCode.textContent = raw;
  if(session.resultPanel) session.resultPanel.hidden = false;
}

function resumeScanSession(session){
  if(!session) return;
  session.resultVisible = false;
  session.paused = false;
  if(session.resultPanel) session.resultPanel.hidden = true;
}

function applyCodeByPrompt(session){
  const code = window.prompt('请输入条码或二维码内容');
  if(!code) return;
  const cleaned = String(code || '').trim();
  if(!cleaned) return;
  handleDetectedCode(session, cleaned);
}

function safeText(value, fallback){
  if(value === undefined || value === null) return fallback || '';
  return String(value);
}

function safeNumber(value, fallback){
  const num = Number(value);
  return Number.isFinite(num) ? num : Number(fallback || 0);
}

function normalizeProductItem(item){
  const next = item && typeof item === 'object' ? item : {};
  return {
    name: safeText(next.name, ''),
    stock: Math.max(0, safeNumber(next.stock, 0)),
    cost: safeNumber(next.cost, 0),
    price: safeNumber(next.price, 0)
  };
}

function normalizeSupplierItem(item){
  const next = item && typeof item === 'object' ? item : {};
  return {
    name: safeText(next.name, ''),
    phone: safeText(next.phone, '')
  };
}

function normalizeOrderItem(item){
  const next = item && typeof item === 'object' ? item : {};
  const orderAmount = safeNumber(next.orderAmount ?? next.order_price, 0);
  const rebate = safeNumber(next.rebate ?? next.refund, 0);
  const freight = safeNumber(next.freight ?? next.shipping, 0);
  const saleAmount = safeNumber(next.saleAmount ?? next.sellAmount, 0);
  return {
    id: safeText(next.id, id()),
    status: next.status === 'advance' ? 'advance' : 'normal',
    date: safeText(next.date, new Date().toISOString().slice(5,10)),
    buyer: safeText(next.buyer ?? next.customer, ''),
    product: safeText(next.product, ''),
    orderAmount: orderAmount,
    rebate: rebate,
    freight: freight,
    saleAmount: saleAmount,
    profit: next.status === 'advance' ? 0 : calcProfit(orderAmount, rebate, freight, saleAmount),
    trackingNo: safeText(next.trackingNo ?? next.trackingNumber, ''),
    remark: safeText(next.remark ?? next.notes, '')
  };
}

function normalizeTradeinItem(item){
  const next = item && typeof item === 'object' ? item : {};
  const newMachinePrice = safeNumber(next.newMachinePrice ?? next.newPrice, 0);
  const oldMachinePrice = safeNumber(next.oldMachinePrice ?? next.oldPrice, 0);
  const recyclePrice = safeNumber(next.recyclePrice ?? next.recycleCashback, 0);
  const refundPrice = safeNumber(next.refundPrice ?? next.refund, 0);
  const salePrice = safeNumber(next.salePrice ?? next.saleAmount, 0);
  const dealDone = typeof next.dealDone === 'boolean' ? next.dealDone : salePrice > 0;
  return {
    id: safeText(next.id, id()),
    date: safeText(next.date, new Date().toISOString().slice(5,10)),
    buyer: safeText(next.buyer ?? next.customer, ''),
    newMachinePrice: newMachinePrice,
    oldMachinePrice: oldMachinePrice,
    recyclePrice: recyclePrice,
    refundPrice: refundPrice,
    salePrice: salePrice,
    profit: dealDone ? calcTradeinProfit(newMachinePrice, oldMachinePrice, recyclePrice, refundPrice, salePrice) : 0,
    trackingNo: safeText(next.trackingNo ?? next.trackingNumber, ''),
    remark: safeText(next.remark ?? next.notes, ''),
    dealDone: dealDone
  };
}

function normalizeCloudPayload(payload, source){
  const raw = payload && typeof payload === 'object' ? payload : {};
  const warnings = [];
  if(!Array.isArray(raw.orders)) warnings.push('orders 已自动修复');
  if(!Array.isArray(raw.tradeinOrders)) warnings.push('tradeinOrders 已自动修复');
  if(!Array.isArray(raw.products)) warnings.push('products 已自动修复');
  if(!Array.isArray(raw.suppliers)) warnings.push('suppliers 已自动修复');
  const normalized = {
    version: raw.version || 'v3-safe',
    schemaVersion: 3,
    orders: (Array.isArray(raw.orders) ? raw.orders : []).map(normalizeOrderItem),
    tradeinOrders: (Array.isArray(raw.tradeinOrders) ? raw.tradeinOrders : []).map(normalizeTradeinItem),
    products: (Array.isArray(raw.products) ? raw.products : []).map(normalizeProductItem),
    suppliers: (Array.isArray(raw.suppliers) ? raw.suppliers : []).map(normalizeSupplierItem),
    orderDraft: raw.orderDraft && typeof raw.orderDraft === 'object' ? Object.assign(orderDraftDefaults(), raw.orderDraft) : orderDraftDefaults(),
    loginStats: normalizeLoginStats(raw.loginStats),
    updatedAt: safeNumber(raw.updatedAt, Date.now()),
    dataHealth: { source: source || 'runtime', checkedAt: Date.now(), warnings: warnings.slice(0, 20) }
  };
  buildDataHealthSnapshot(source || 'runtime', warnings);
  return { ok: true, payload: normalized, warnings: warnings };
}

function saveBackupSnapshot(reason, force){
  try{
    const now = Date.now();
    const key = backupStorageKey();
    const nextData = makeCloudPayload();
    const raw = localStorage.getItem(key);
    let prev = null;
    if(raw){
      try{ prev = JSON.parse(raw); }catch(e){}
    }
    const prevDataText = prev && prev.data ? JSON.stringify(prev.data) : '';
    const nextDataText = JSON.stringify(nextData);
    const minInterval = 30 * 60 * 1000;
    const lastAt = prev && prev.createdAt ? Number(prev.createdAt) : 0;
    const tooSoon = !force && lastAt && (now - lastAt < minInterval);
    const sameData = prevDataText && prevDataText === nextDataText;
    if(tooSoon || sameData) return false;
    const payload = {
      reason: reason || 'manual',
      createdAt: now,
      data: nextData
    };
    localStorage.setItem(key, JSON.stringify(payload));
    return true;
  }catch(err){ console.error(err); return false; }
}

function applyCloudPayload(payload){
  const normalized = normalizeCloudPayload(payload, 'cloud-load');
  if(!normalized || !normalized.ok || !normalized.payload) return false;
  const next = normalized.payload;
  state.orders = next.orders;
  state.tradeinOrders = next.tradeinOrders;
  state.products = next.products;
  state.suppliers = next.suppliers;
  state.orderDraft = next.orderDraft || orderDraftDefaults();
  state.loginStats = normalizeLoginStats(next.loginStats);
  persistLoginStats();
  persist();
  render();
  return true;
}

async function loginSystem(){
  if(!supa){
    showToast('登录组件初始化失败');
    return;
  }
  const emailEl = document.getElementById('loginEmail');
  const pwdEl = document.getElementById('loginPassword');
  const submit = document.getElementById('loginSubmitBtn');
  const email = (emailEl && emailEl.value || '').trim();
  const password = (pwdEl && pwdEl.value || '').trim();
  if(!email){ setLoginMessage('请输入账号'); return; }
  if(!password){ setLoginMessage('请输入密码'); return; }
  setLoginMessage('');
  if(submit){ submit.disabled = true; submit.textContent = '登录中…'; }
  try{
    const res = await supa.auth.signInWithPassword({email, password});
    if(res.error) throw res.error;
    const user = res.data && res.data.user ? res.data.user : null;
    authState.user = user;
    authState.isAdmin = !!(user && user.email && user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase());
    authState.ready = true;
    applyUserScopedStorage(user && user.id);
    closeLoginLayer();
    const loaded = await loadCloudState(false);
    if(!loaded){
      const imported = await importLegacyOrdersIfNeeded(false);
      if(imported > 0) await saveCurrentAppStateToCloud(false);
      else render();
    }
    recordLoginSuccess();
    await saveCurrentAppStateToCloud(false);
    await syncTodayLoginStatToDailyTable();
    render();
    if(authState.isAdmin) setTimeout(loadAdminList, 60);
    showNiceModal(authState.isAdmin ? '管理员登录成功' : '登录成功', authState.isAdmin ? '已进入当前正式版系统' : '欢迎回来', '✓');
  }catch(err){
    setLoginMessage('登录失败：' + translateSupabaseError((err && err.message) || err));
  }finally{
    if(submit){ submit.disabled = false; submit.textContent = '登录'; }
  }
}

async function restoreLoginSession(){
  mountLoginLayer();
  if(!supa){
    authState.ready = true;
    openLoginLayer();
    return;
  }
  try{
    const res = await supa.auth.getSession();
    const session = res.data && res.data.session ? res.data.session : null;
    if(session && session.user){
      authState.user = session.user;
      authState.isAdmin = !!(session.user.email && session.user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase());

function copyAdminVX(){
  const vx = 'pinking0000';
  const done = function(){
    showToast('微信号已复制，请打开微信添加管理员');
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(vx).then(done).catch(function(){
      fallbackCopyText(vx, done);
    });
    return;
  }
  fallbackCopyText(vx, done);
}
function fallbackCopyText(text, onDone){
  try{
    const input = document.createElement('input');
    input.value = text;
    document.body.appendChild(input);
    input.select();
    document.execCommand('copy');
    document.body.removeChild(input);
    if(typeof onDone === 'function') onDone();
  }catch(err){
    console.error(err);
    showToast('复制失败，请手动添加：pinking0000');
  }
}

function normalizeLegacyOrder(o){
  return {
    id: id(),
    status: 'normal',
    date: normalizeDate(o.date || o.createdAt || o.created_at || ''),
    buyer: o.buyer ?? o.customer ?? '',
    product: o.product ?? '',
    orderAmount: Number(o.orderAmount ?? o.amount ?? 0),
    rebate: Number(o.rebate ?? o.refund ?? 0),
    freight: Number(o.freight ?? o.shipping ?? 0),
    saleAmount: Number(o.saleAmount ?? o.sellAmount ?? 0),
    profit: Number(o.profit ?? calcProfit(o.orderAmount ?? o.amount ?? 0, o.rebate ?? o.refund ?? 0, o.freight ?? o.shipping ?? 0, o.saleAmount ?? o.sellAmount ?? 0)),
    trackingNo: o.trackingNo ?? o.trackingNumber ?? '',
    remark: o.remark ?? o.notes ?? ''
  };
}

function mergeLegacyOrders(list){
  const exists = new Set(state.orders.map(function(o){
    return [String(o.date||''), String(o.buyer||''), String(o.product||''), Number(o.orderAmount||0), Number(o.saleAmount||0), String(o.trackingNo||''), String(o.remark||'')].join('|');
  }));
  let added = 0;
  (list || []).forEach(function(src){
    const o = normalizeLegacyOrder(src || {});
    const sig = [String(o.date||''), String(o.buyer||''), String(o.product||''), Number(o.orderAmount||0), Number(o.saleAmount||0), String(o.trackingNo||''), String(o.remark||'')].join('|');
    if(exists.has(sig)) return;
    exists.add(sig);
    state.orders.push(o);
    added += 1;
  });
  if(added > 0){
    persist();
  }
  return added;
}

async function importLegacyOrdersIfNeeded(force){
  if(!supa || !authState.user) return 0;
  const importKey = 'jxc_legacy_import_done_' + authState.user.id;
  if(!force && localStorage.getItem(importKey) === '1') return 0;
  try{
    let { data, error } = await supa.from('app_state_user').select('data').eq('id', authState.user.id).maybeSingle();
    if((!data || data.data == null) && !error){
      const alt = await supa.from('app_state_user').select('data').eq('user_id', authState.user.id).maybeSingle();
      data = alt.data;
      error = alt.error;
    }
    if(error || !data || data.data == null){
      localStorage.setItem(importKey, '1');
      return 0;
    }
    const legacyRaw = Array.isArray(data.data) ? data.data : (Array.isArray(data.data.orders) ? data.data.orders : []);
    const added = mergeLegacyOrders(legacyRaw);
    localStorage.setItem(importKey, '1');
    if(added > 0){
      render();
      showToast('已导入旧报表数据 ' + added + ' 条');
    }
    return added;
  }catch(err){
    console.error(err);
    return 0;
  }
}

async function getAccessToken(){
  if(!supa) return null;
  try{
    const { data } = await supa.auth.getSession();
    return (data && data.session && data.session.access_token) || null;
  }catch(err){
    return null;
  }
}

async function callEdgeBodyToken(fnName, body){
  const token = await getAccessToken();
  if(!token) throw new Error('会话已失效，请重新登录');
  const url = SUPABASE_URL.replace(/\/$/, '') + '/functions/v1/' + fnName + '?t=' + Date.now();
  const payload = Object.assign({ access_token: token }, body || {});
  const resp = await fetch(url, {
    method:'POST',
    mode:'cors',
    cache:'no-store',
    headers:{
      'apikey': SUPABASE_KEY,
      'Content-Type':'application/json'
    },
    body: JSON.stringify(payload)
  });
  let json = null;
  try{ json = await resp.json(); }catch(err){}
  if(!resp.ok){
    const msg = (json && (json.error || json.message)) ? (json.error || json.message) : (resp.status + ' ' + resp.statusText);
    throw new Error(msg);
  }
  if(json && json.error) throw new Error(json.error);
  return json;
}

function genStrongPw(n){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%*?';
  let out = '';
  for(let i=0;i<(n||12);i++) out += chars[Math.floor(Math.random()*chars.length)];
  return out;
}

function renderAdminTable(){
  const tb = document.getElementById('adminTbody');
  if(!tb) return;
  if(!state.adminListVisible){
    tb.innerHTML = '<tr><td colspan="3">账号列表当前已隐藏</td></tr>';
    return;
  }
  const keyword = String(state.adminAccountSearch || '').trim().toLowerCase();
  const rows = (state.adminUsers || []).filter(function(r){
    const email = String(r.email || r.id || '').toLowerCase();
    return !keyword || email.includes(keyword);
  });
  if(!rows.length){
    tb.innerHTML = `<tr><td colspan="3">${keyword ? '暂无匹配账号' : '暂无账号数据'}</td></tr>`;
    return;
  }
  tb.innerHTML = rows.map(function(r){
    const email = r.email || r.id;
    const enabled = r.disabled !== true;
    const t = r.created_at ? String(r.created_at).replace('T',' ').slice(0,19) : '';
    return '<tr>' +
      '<td>' + escapeHtml(email) + '</td>' +
      '<td><a class="admin-link" data-uid="' + r.id + '" data-enabled="' + (enabled ? '1':'0') + '">' + (enabled ? '✅ 允许' : '⛔ 禁用') + '</a></td>' +
      '<td>' + escapeHtml(t) + '</td>' +
    '</tr>';
  }).join('');
  tb.querySelectorAll('a.admin-link').forEach(function(a){
    a.onclick = async function(){
      const uid = a.getAttribute('data-uid');
      const cur = a.getAttribute('data-enabled') === '1';
      const next = !cur;
      const { error: upE } = await supa.from('user_profiles').update({ disabled: !next }).eq('id', uid);
      if(upE){ showToast('更新失败：' + translateSupabaseError(upE.message || upE)); return; }
      loadAdminList();
    };
  });
}

function closeAccountModal(){
  const mask = document.getElementById('accountModalMask');
  if(mask && mask.parentNode) mask.parentNode.removeChild(mask);

function openAccountModal(options){
  const opts = options || {};
  closeAccountModal();
  const mask = document.createElement('div');
  mask.id = 'accountModalMask';
  mask.className = 'account-modal-mask';
  const fields = Array.isArray(opts.fields) ? opts.fields : [];
  const fieldHtml = fields.map(function(field, index){
    const id = 'accountModalField_' + index;
    const label = field.label ? '<label for="' + id + '">' + escapeHtml(field.label) + '</label>' : '';
    const type = field.type || 'text';
    const placeholder = field.placeholder ? ' placeholder="' + escapeHtml(field.placeholder) + '"' : '';
    const value = field.value ? ' value="' + escapeHtml(field.value) + '"' : '';
    const autocomplete = field.autocomplete ? ' autocomplete="' + escapeHtml(field.autocomplete) + '"' : '';
    if(type === 'textarea'){
      return '<div class="account-modal-field">' + label + '<textarea id="' + id + '" data-field-key="' + escapeHtml(field.key || '') + '"' + placeholder + ' style="width:100%;min-height:108px;border:1px solid #e6ebf1;background:#f8fbff;border-radius:14px;padding:12px 14px;font-size:14px;outline:none;resize:vertical;">' + escapeHtml(field.value || '') + '</textarea></div>';
    }
    return '<div class="account-modal-field">' + label + '<input id="' + id + '" data-field-key="' + escapeHtml(field.key || '') + '" type="' + escapeHtml(type) + '"' + placeholder + value + autocomplete + ' /></div>';
  }).join('');
  const primaryClass = opts.danger ? 'account-modal-btn delete' : 'account-modal-btn primary';
  mask.innerHTML = `
    <div class="account-modal-box">
      <div class="account-modal-title">${opts.title || '操作'}</div>
      <div class="account-modal-desc">${opts.desc || ''}</div>
      ${fieldHtml}
      <div id="accountModalMsg" class="account-modal-msg"></div>
      <div class="account-modal-actions">
        <button class="account-modal-btn cancel" type="button">取消</button>
        <button class="${primaryClass}" type="button">${opts.confirmText || '确定'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(mask);
  const close = function(){ closeAccountModal(); };
  mask.addEventListener('click', function(e){ if(e.target === mask) close(); });
  const cancelBtn = mask.querySelector('.account-modal-btn.cancel');
  const okBtn = mask.querySelector('.account-modal-actions button:last-child');
  const msgBox = mask.querySelector('#accountModalMsg');
  const inputs = Array.from(mask.querySelectorAll('[data-field-key]'));
  function setMsg(msg){ if(msgBox) msgBox.textContent = msg || ''; }
  async function submit(){
    try{
      if(okBtn){ okBtn.disabled = true; okBtn.textContent = opts.loadingText || '处理中...'; }
      setMsg('');
      const values = {};
      inputs.forEach(function(input){ values[input.getAttribute('data-field-key')] = (input.value || '').trim(); });
      if(typeof opts.onSubmit === 'function') await opts.onSubmit(values, setMsg, close);
    }catch(err){
      setMsg(translateSupabaseError((err && err.message) || String(err)));
    }finally{
      if(okBtn){ okBtn.disabled = false; okBtn.textContent = opts.confirmText || '确定'; }
    }
  }
  if(cancelBtn) cancelBtn.onclick = close;
  if(okBtn) okBtn.onclick = submit;
  inputs.forEach(function(input, index){
    input.addEventListener('keydown', function(e){
      if(e.key === 'Enter'){
        e.preventDefault();
        if(index < inputs.length - 1) inputs[index + 1].focus();
        else submit();
      }
    });
  });
  setTimeout(function(){ if(inputs[0]) inputs[0].focus(); }, 30);
}

    desc:'请输入新的登录密码，至少 6 位。',

    loadingText:'修改中...',
    fields:[
      {key:'password', label:'新密码', type:'password', placeholder:'请输入新密码', autocomplete:'new-password'},
      {key:'confirmPassword', label:'确认密码', type:'password', placeholder:'请再次输入新密码', autocomplete:'new-password'}

    onSubmit: async function(values, setMsg, close){
      const password = values.password || '';

      close();
      showNiceModal('修改成功', '密码已更新，请牢记新密码', '✓');

  });
