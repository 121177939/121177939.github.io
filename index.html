<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
const store = {
  load(key, fallback){
    try{return JSON.parse(localStorage.getItem(key)) ?? fallback}catch(e){return fallback}
  },
  save(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
};

const state = {
  products: store.load('jxc_products', [
    {name:'华为手表', stock:20, cost:1500, price:2150},
    {name:'赫莲娜小白瓶', stock:12, cost:900, price:1170},
    {name:'娇诗韵三件套', stock:8, cost:1200, price:1587}
  ]),
  sales: store.load('jxc_sales', []),
  suppliers: store.load('jxc_suppliers', [{name:'默认供应商', phone:'13800000000'}]),
  orders: store.load('jxc_orders', [
    {id:id(), status:'normal', date:'03-08', buyer:'象兄', product:'华为手表', orderAmount:2150, rebate:0, freight:0, saleAmount:2150, profit:0, trackingNo:'', remark:''},
    {id:id(), status:'normal', date:'03-08', buyer:'标', product:'赫莲娜小白瓶', orderAmount:1170, rebate:50, freight:0, saleAmount:1170, profit:-50, trackingNo:'', remark:''},
    {id:id(), status:'normal', date:'03-07', buyer:'晶1', product:'vivos50', orderAmount:2469, rebate:0, freight:0, saleAmount:2469, profit:0, trackingNo:'', remark:''}
  ]),
  tab: 'home',
  orderSearch: '',
  orderDraft: store.load('jxc_order_draft', {})
};

function id(){
  return 'id_' + Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);
}
state.orders = state.orders.map(o => ({
  id: o.id || id(),
  status: o.status === 'advance' ? 'advance' : 'normal',
  date: o.date || new Date().toISOString().slice(5,10),
  buyer: o.buyer ?? o.customer ?? '',
  product: o.product ?? '',
  orderAmount: Number(o.orderAmount ?? 0),
  rebate: Number(o.rebate ?? o.refund ?? 0),
  freight: Number(o.freight ?? o.shipping ?? 0),
  saleAmount: Number(o.saleAmount ?? o.sellAmount ?? 0),
  profit: Number(o.profit ?? 0),
  trackingNo: o.trackingNo ?? o.trackingNumber ?? '',
  remark: o.remark ?? o.notes ?? ''
}));

function persist(){
  store.save('jxc_products', state.products);
  store.save('jxc_sales', state.sales);
  store.save('jxc_suppliers', state.suppliers);
  store.save('jxc_orders', state.orders);
  if(authState && authState.user){
    scheduleCloudSave('persist');
  }
}

function sortByDateDesc(list){
  return [...list].sort((a,b)=> String(b.date).localeCompare(String(a.date)));
}
function advanceOrders(){
  return sortByDateDesc(state.orders.filter(o => o.status === 'advance'));
}
function soldOrders(){
  return sortByDateDesc(state.orders.filter(o => o.status !== 'advance' && Number(o.saleAmount || 0) > 0));
}
function unsoldOrders(){
  return sortByDateDesc(state.orders.filter(o => o.status !== 'advance' && Number(o.saleAmount || 0) <= 0));
}
function todaySales(){
  const today = new Date().toISOString().slice(5,10);
  return soldOrders().filter(s=>String(s.date).includes(today)).reduce((a,b)=>a+Number(b.saleAmount||0),0);
}
function monthSales(){
  return soldOrders().reduce((a,b)=>a+Number(b.saleAmount||0),0);
}
function monthProfit(){
  return soldOrders().reduce((a,b)=>a+Number(b.profit||0),0);
}
function totalPrincipal(){
  return soldOrders().reduce((a,b)=>{
    return a + Number(b.orderAmount||0) + Number(b.rebate||0) - Number(b.freight||0);
  },0);
}
function profitRate(){
  const principal = totalPrincipal();
  if(principal <= 0) return '0.00';
  return (monthProfit() / principal * 100).toFixed(2);
}
function money(n){ return Number(n||0).toFixed(2); }
function setTab(tab){
  state.tab = tab;
  render();
  if(tab === 'admin' && authState.isAdmin){
    setTimeout(loadAdminList, 60);
  }
}

function showToast(message){
  let toast = document.getElementById('globalToast');
  if(!toast){
    toast = document.createElement('div');
    toast.id = 'globalToast';
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  toast.textContent = message || '';
  toast.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(function(){
    toast.classList.remove('show');
  }, 1800);
}



function showNiceModal(title, desc, icon){
  const old = document.getElementById('niceModalMask');
  if(old && old.parentNode) old.parentNode.removeChild(old);

  const mask = document.createElement('div');
  mask.id = 'niceModalMask';
  mask.className = 'nice-modal-mask';
  mask.innerHTML = `
    <div class="nice-modal">
      <div class="nice-modal-icon">${icon || '✓'}</div>
      <div class="nice-modal-title">${title || '操作成功'}</div>
      <div class="nice-modal-desc">${desc || '本次操作已完成'}</div>
      <button class="nice-modal-btn" type="button">知道了</button>
    </div>
  `;
  document.body.appendChild(mask);

  const close = function(){
    if(mask && mask.parentNode) mask.parentNode.removeChild(mask);
  };
  mask.addEventListener('click', function(e){
    if(e.target === mask) close();
  });
  const btn = mask.querySelector('.nice-modal-btn');
  if(btn) btn.onclick = close;

  clearTimeout(showNiceModal._timer);
  showNiceModal._timer = setTimeout(close, 1500);
}

function showConfirmModal(msg, onOk){
  const old = document.getElementById('confirmModalMask');
  if(old && old.parentNode) old.parentNode.removeChild(old);

  const mask = document.createElement('div');
  mask.id = 'confirmModalMask';
  mask.className = 'confirm-mask';
  mask.innerHTML = `
    <div class="confirm-box">
      <div class="confirm-title">${msg}</div>
      <div class="confirm-actions">
        <button class="confirm-btn confirm-cancel" type="button">取消</button>
        <button class="confirm-btn confirm-ok" type="button">确定</button>
      </div>
    </div>
  `;
  document.body.appendChild(mask);

  const close = function(){
    if(mask && mask.parentNode) mask.parentNode.removeChild(mask);
  };
  mask.addEventListener('click', function(e){
    if(e.target === mask) close();
  });
  const cancelBtn = mask.querySelector('.confirm-cancel');
  const okBtn = mask.querySelector('.confirm-ok');
  if(cancelBtn) cancelBtn.onclick = close;
  if(okBtn) okBtn.onclick = function(){
    close();
    if(typeof onOk === 'function') onOk();
  };
}


function addProduct(form){
  const fd = new FormData(form);
  state.products.push({
    name: fd.get('name'),
    stock: Number(fd.get('stock')||0),
    cost: Number(fd.get('cost')||0),
    price: Number(fd.get('price')||0)
  });
  persist(); showToast('已添加商品'); setTab('goods');
}

function normalizeDate(v){
  if(!v) return new Date().toISOString().slice(5,10);
  if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v.slice(5);
  return v;
}

function calcProfit(orderAmount, rebate, freight, saleAmount){
  const sale = Number(saleAmount||0);
  if(sale <= 0) return 0;
  return sale - Number(orderAmount||0) - Number(rebate||0) - Number(freight||0);
}


function orderDraftDefaults(){
  return {
    date: new Date().toISOString().slice(0,10),
    buyer:'',
    product:'',
    orderAmount:'',
    rebate:'0',
    freight:'0',
    saleAmount:'',
    trackingNo:'',
    remark:''
  };
}

function saveOrderDraftFromForm(form){
  if(!form) return;
  const fields = ['date','buyer','product','orderAmount','rebate','freight','saleAmount','trackingNo','remark'];
  const draft = {};
  fields.forEach(name => {
    const el = form.querySelector(`[name="${name}"]`);
    draft[name] = el ? el.value : '';
  });
  state.orderDraft = Object.assign(orderDraftDefaults(), draft);
  store.save('jxc_order_draft', state.orderDraft);
}

function clearOrderDraft(){
  state.orderDraft = orderDraftDefaults();
  store.save('jxc_order_draft', state.orderDraft);
}

function hydrateOrderForm(form){
  if(!form) return;
  const draft = Object.assign(orderDraftDefaults(), state.orderDraft || {});
  Object.keys(draft).forEach(name => {
    const el = form.querySelector(`[name="${name}"]`);
    if(el) el.value = draft[name];
  });
  const preview = form.querySelector('#profitPreview');
  if(preview){
    const p = calcProfit(draft.orderAmount, draft.rebate, draft.freight, draft.saleAmount).toFixed(2);
    preview.value = '¥' + p;
  }
}

function useProductTemplate(form){
  if(!form) return;
  const productName = form.querySelector('[name="product"]')?.value?.trim();
  if(!productName) return;
  const product = state.products.find(p => p.name === productName);
  if(!product) return;
  const saleInput = form.querySelector('[name="saleAmount"]');
  if(saleInput && !saleInput.value) saleInput.value = Number(product.price || 0);
  saveOrderDraftFromForm(form);
  const preview = form.querySelector('#profitPreview');
  if(preview){
    const order = form.querySelector('[name="orderAmount"]');
    const rebate = form.querySelector('[name="rebate"]');
    const freight = form.querySelector('[name="freight"]');
    const sale = form.querySelector('[name="saleAmount"]');
    preview.value = '¥' + calcProfit(order?.value, rebate?.value, freight?.value, sale?.value).toFixed(2);
  }
}

function addOrder(form, mode='normal'){
  const fd = new FormData(form);
  const orderAmount = Number(fd.get('orderAmount')||0);
  const rebate = Number(fd.get('rebate')||0);
  const freight = Number(fd.get('freight')||0);
  const saleAmount = Number(fd.get('saleAmount')||0);
  const profit = calcProfit(orderAmount, rebate, freight, saleAmount);
  state.orders.unshift({
    id: id(),
    status: mode === 'advance' ? 'advance' : 'normal',
    date: normalizeDate(fd.get('date')),
    buyer: fd.get('buyer'),
    product: fd.get('product'),
    orderAmount,
    rebate,
    freight,
    saleAmount: mode === 'advance' ? 0 : saleAmount,
    profit: mode === 'advance' ? 0 : profit,
    trackingNo: fd.get('trackingNo'),
    remark: fd.get('remark')
  });
  persist();
  clearOrderDraft();
  form.reset();
  const dateInput = form.querySelector('[name="date"]');
  if(dateInput) dateInput.value = new Date().toISOString().slice(0,10);
  const rebateInput = form.querySelector('[name="rebate"]');
  const freightInput = form.querySelector('[name="freight"]');
  if(rebateInput) rebateInput.value = '0';
  if(freightInput) freightInput.value = '0';
  const preview = form.querySelector('#profitPreview');
  if(preview) preview.value = '¥0.00';
  render();
  showNiceModal(
    mode === 'advance' ? '垫付录入成功' : '录入成功',
    mode === 'advance' ? '订单已经进入垫付中心' : '订单已经成功保存',
    '✓'
  );
}

function filteredOrders(sourceList){
  const q = state.orderSearch.trim().toLowerCase();
  let list = Array.isArray(sourceList) ? sourceList : state.orders;
  if(q){
    list = list.filter(o =>
      [o.date,o.buyer,o.product,o.trackingNo,o.remark].join(' ').toLowerCase().includes(q)
    );
  }
  return list;
}

function updateOrderField(orderId, field, value){
  const order = state.orders.find(o => o.id === orderId);
  if(!order) return;
  if(['orderAmount','rebate','freight','saleAmount'].includes(field)){
    order[field] = value === '' ? 0 : Number(value || 0);
    order.profit = calcProfit(order.orderAmount, order.rebate, order.freight, order.saleAmount);
  }else{
    order[field] = value;
  }
  persist();
}

function refreshRowAfterNumericEdit(inputEl, orderId, field, value){
  updateOrderField(orderId, field, value);
  const row = inputEl && inputEl.closest ? inputEl.closest('tr') : null;
  if(row){
    const profitBox = row.querySelector('.profit-box');
    const order = state.orders.find(o => o.id === orderId);
    if(profitBox && order) profitBox.textContent = '¥' + money(order.profit);
  }
}

function finalizeOrderRow(orderId){
  persist();
  render();
}
function deliverAdvanceOrder(orderId){
  const order = state.orders.find(o => o.id === orderId);
  if(!order) return;
  showConfirmModal('确定发货？', function(){
    order.status = 'normal';
    order.saleAmount = 0;
    order.profit = 0;
    persist();
    render();
    showNiceModal('发货成功', '订单已转入未售出', '✓');
  });
}
function refundAdvanceOrder(orderId){
  const idx = state.orders.findIndex(o => o.id === orderId);
  if(idx === -1) return;
  showConfirmModal('确定退款？', function(){
    state.orders.splice(idx, 1);
    persist();
    render();
    showNiceModal('退款成功', '垫付订单已退款并删除', '✓');
  });
}
function deleteOrder(orderId){
  const idx = state.orders.findIndex(o => o.id === orderId);
  if(idx === -1) return;
  showConfirmModal('确定删除这笔订单吗？', function(){
    state.orders.splice(idx, 1);
    persist();
    render();
    showNiceModal('删除成功', '这笔订单已经删除', '✓');
  });
}

function menuCard(iconClass, emoji, text, sub, onClick, badgeCount=0){
  const badge = Number(badgeCount || 0) > 0
    ? `<span class="home-badge">${Number(badgeCount) > 99 ? '99+' : Number(badgeCount)}</span>`
    : '';
  const action = String(onClick || '').replaceAll('\\','\\\\').replaceAll("'","\\'");
  return `<div class="item" onclick="tapMenuCard(this, '${action}')">
    ${badge}
    <div class="icon ${iconClass}">${emoji}</div>
    <div class="text">${text}</div>
    <div class="sub">${sub}</div>
  </div>`;
}

function tapMenuCard(el, action){
  if(!el) return;
  el.classList.add('pressed');
  try{
    if(navigator.vibrate) navigator.vibrate(10);
  }catch(e){}
  setTimeout(function(){
    try{
      if(action) (new Function(action))();
    }finally{
      setTimeout(function(){
        el.classList.remove('pressed');
      }, 120);
    }
  }, 90);
}


function animateHomeStats(){
  requestAnimationFrame(() => {
    document.querySelectorAll('.hero .stat .value, .hero .big').forEach(el => {
      const raw = el.getAttribute('data-value');
      if(raw === null) return;
      const end = Number(raw || 0);
      const isPercent = el.getAttribute('data-suffix') === '%';
      const duration = 700;
      const start = performance.now();
      function frame(now){
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = end * eased;
        el.classList.add('animating');
        el.textContent = isPercent ? current.toFixed(2) + '%' : current.toFixed(2);
        if(progress < 1){
          requestAnimationFrame(frame);
        }else{
          el.textContent = isPercent ? end.toFixed(2) + '%' : end.toFixed(2);
        }
      }
      requestAnimationFrame(frame);
    });
  });
}

function sectionHeader(title, subtitle=''){
  return `<div class="sheet-hd">
    <div class="sheet-title-wrap">
      <button class="back-btn" onclick="setTab('home')">
        <span class="arrow">←</span><span>返回</span>
      </button>
      <span>${title}</span>
    </div>
    <span class="small">${subtitle}</span>
  </div>`;
}


function accountEntryHtml(){
  if(!authState.ready || !authState.user){
    return `<button class="auth-chip" type="button" onclick="openLoginLayer()">登录</button>`;
  }
  const label = authState.isAdmin ? '管理员' : ((authState.user.email || '已登录').split('@')[0] || '已登录');
  return `<button class="auth-chip ${authState.isAdmin ? 'admin' : ''}" type="button" onclick="handleAccountTap()">${escapeHtml(label)}</button>`;
}

function handleAccountTap(){
  if(!authState.user){
    openLoginLayer();
    return;
  }
  showConfirmModal(authState.isAdmin ? '当前为管理员账号，是否退出登录？' : '是否退出当前账号？', function(){
    logoutSystem();
  });
}

function homeView(){
  return `
  <div class="phone">
    <div class="hero">
      <div class="topbar"><div>撸货 · 进销存管理</div>${accountEntryHtml()}</div>
      <div class="title">今日销售额</div>
      <div class="big" data-value="${todaySales()}">${money(todaySales())}</div>
      <div class="statrow">
        <div class="stat"><span class="label">总销售额</span><span class="value" data-value="${monthSales()}">${money(monthSales())}</span></div>
        <div class="stat"><span class="label">总利润</span><span class="value" data-value="${monthProfit()}">${money(monthProfit())}</span></div>
        <div class="stat"><span class="label">收益率</span><span class="value" data-value="${profitRate()}" data-suffix="%">${profitRate()}%</span></div>
      </div>
    </div>

    <div class="notice"><span>先赚人心后赚钱</span><span>›</span></div>

function addSale(form){
  const fd = new FormData(form);
  const name = fd.get('product');
  const qty = Number(fd.get('qty')||0);
  const product = state.products.find(p=>p.name===name);
  if(!product) return alert('请选择商品');
  if(qty<=0) return alert('数量必须大于0');
  if(product.stock < qty) return alert('库存不足');
  product.stock -= qty;
  const total = qty * product.price;
  const costTotal = qty * product.cost;
  state.sales.unshift({
    product:name, qty, total, costTotal,
    date:new Date().toISOString().slice(0,10)
  });
  persist(); showToast('销售已保存'); setTab('detail');
}

function triggerImportOrders(){
  const input = document.getElementById('importOrdersInput');
  if(!input) return;
  input.click();
}

function normalizeImportedKey(key){
  return String(key || '').replace(/\s+/g,'').trim();
}

function mapImportedOrder(row){
  const raw = {};
  Object.keys(row || {}).forEach(key => {
    raw[normalizeImportedKey(key)] = row[key];
  });
  const dateValue = raw['日期'] ?? raw['下单日期'] ?? raw['时间'] ?? '';
  const orderAmount = Number(raw['下单金额'] ?? raw['进价'] ?? 0);
  const rebate = Number(raw['返款'] ?? raw['退款'] ?? 0);
  const freight = Number(raw['运费'] ?? raw['邮费'] ?? 0);
  const saleAmount = Number(raw['售出金额'] ?? raw['卖价'] ?? 0);
  const profitCell = raw['利润'];
  const statusValue = String(raw['订单状态'] ?? raw['状态'] ?? '').trim();
  return {
    id: id(),
    status: statusValue === 'advance' || statusValue === '垫付' || statusValue === '垫付中心' ? 'advance' : 'normal',
    date: normalizeDate(dateValue),
    buyer: String(raw['下单人'] ?? raw['客户'] ?? ''),
    product: String(raw['产品'] ?? raw['商品'] ?? ''),
    orderAmount,
    rebate,
    freight,
    saleAmount,
    profit: profitCell === undefined || profitCell === null || profitCell === '' ? calcProfit(orderAmount, rebate, freight, saleAmount) : Number(profitCell || 0),
    trackingNo: String(raw['物流单号'] ?? raw['单号'] ?? ''),
    remark: String(raw['备注'] ?? raw['说明'] ?? '')
  };
}

function handleImportOrders(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  if(typeof XLSX === 'undefined'){
    showToast('导入组件加载失败，请检查网络后重试');
    event.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type:'array'});
      const sheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:''});
      const imported = rows
        .map(mapImportedOrder)
        .filter(item => item.date || item.buyer || item.product || item.orderAmount || item.saleAmount || item.remark || item.trackingNo);
      if(!imported.length){

async function startGenericScan(onDetected){
  if(activeScanSession){
    showToast('请先关闭当前扫码窗口');
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    showToast('当前设备不支持打开摄像头');
    return;
  }
  if(typeof BarcodeDetector === 'undefined'){
    showToast('当前浏览器暂不支持扫码，请用 Chrome 或系统 WebView 新版打开');
    return;
  }
  try{
    const formats = BarcodeDetector.getSupportedFormats ? await BarcodeDetector.getSupportedFormats() : detectorFormats();
    const usableFormats = detectorFormats().filter(f => formats.includes(f));
    const detector = new BarcodeDetector({formats: usableFormats.length ? usableFormats : detectorFormats()});
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ideal:'environment'},
        width:{ideal:1280},
        height:{ideal:720}
      },
      audio:false
    });

    const overlay = document.createElement('div');
    overlay.className = 'scan-overlay';
    overlay.innerHTML = `
      <div class="scan-overlay-top">
        <div>连续扫码中，识别后自动追加到备注</div>
        <button class="scan-close" type="button">关闭</button>
      </div>
      <video playsinline autoplay muted></video>
      <div class="scan-overlay-tip">把条形码或二维码对准镜头，多个编码会自动用逗号追加</div>
    `;
    document.body.appendChild(overlay);

    const video = overlay.querySelector('video');
    const closeBtn = overlay.querySelector('.scan-close');
    video.srcObject = stream;
    await video.play();

    const session = {
      detector,
      stream,
      overlay,
      video,
      timer:null,
      lastCode:'',
      lastAt:0,
      onDetected:onDetected
    };
    activeScanSession = session;
    closeBtn.onclick = closeRemarkScan;

    session.timer = setInterval(async function(){
      if(!activeScanSession || activeScanSession !== session) return;
      if(video.readyState < 2) return;
      try{
        const results = await detector.detect(video);
        if(!results || !results.length) return;
        const raw = String(results[0].rawValue || '').trim();
        if(!raw) return;
        const now = Date.now();
        if(raw === session.lastCode && now - session.lastAt < 1200) return;
        session.lastCode = raw;
        session.lastAt = now;
        if(typeof session.onDetected === 'function'){
          session.onDetected(raw);
        }
      }catch(err){
        console.error(err);
      }
    }, 450);
  }catch(err){
    console.error(err);
    showToast('打开扫码失败，请检查摄像头权限');
    closeRemarkScan();
  }
}

function saveBackupSnapshot(reason, force){
  try{
    const now = Date.now();
    const key = backupStorageKey();
    const nextData = makeCloudPayload();
    const raw = localStorage.getItem(key);
    let prev = null;
    if(raw){
      try{ prev = JSON.parse(raw); }catch(e){}
    }
    const prevDataText = prev && prev.data ? JSON.stringify(prev.data) : '';
    const nextDataText = JSON.stringify(nextData);
    const minInterval = 30 * 60 * 1000;
    const lastAt = prev && prev.createdAt ? Number(prev.createdAt) : 0;
    const tooSoon = !force && lastAt && (now - lastAt < minInterval);
    const sameData = prevDataText && prevDataText === nextDataText;
    if(tooSoon || sameData) return false;
    const payload = {
      reason: reason || 'manual',
      createdAt: now,
      data: nextData
    };
    localStorage.setItem(key, JSON.stringify(payload));
    return true;
  }catch(err){ console.error(err); return false; }
}

function applyCloudPayload(payload){
  if(!payload || typeof payload !== 'object') return false;
  state.orders = Array.isArray(payload.orders) ? payload.orders : [];
  state.products = Array.isArray(payload.products) ? payload.products : [];
  state.suppliers = Array.isArray(payload.suppliers) ? payload.suppliers : [];
  state.orderDraft = payload.orderDraft || {};
  persist();
  render();
  return true;
}

  return {

    buyer: o.buyer ?? o.customer ?? '',
    product: o.product ?? '',

    profit: Number(o.profit ?? calcProfit(o.orderAmount ?? o.amount ?? 0, o.rebate ?? o.refund ?? 0, o.freight ?? o.shipping ?? 0, o.saleAmount ?? o.sellAmount ?? 0)),
    trackingNo: o.trackingNo ?? o.trackingNumber ?? '',
    remark: o.remark ?? o.notes ?? ''
  };
}

function mergeLegacyOrders(list){
  const exists = new Set(state.orders.map(function(o){
    return [String(o.date||''), String(o.buyer||''), String(o.product||''), Number(o.orderAmount||0), Number(o.saleAmount||0), String(o.trackingNo||''), String(o.remark||'')].join('|');
  }));
  let added = 0;
  (list || []).forEach(function(src){
    const o = normalizeLegacyOrder(src || {});
    const sig = [String(o.date||''), String(o.buyer||''), String(o.product||''), Number(o.orderAmount||0), Number(o.saleAmount||0), String(o.trackingNo||''), String(o.remark||'')].join('|');
    if(exists.has(sig)) return;
    exists.add(sig);
    state.orders.push(o);
    added += 1;
  });
  if(added > 0){
    persist();
  }
  return added;
}

  const token = await getAccessToken();
  if(!token) throw new Error('会话已失效，请重新登录');
  const url = SUPABASE_URL.replace(/\/$/, '') + '/functions/v1/' + fnName + '?t=' + Date.now();
  const payload = Object.assign({ access_token: token }, body || {});
  const resp = await fetch(url, {
    method:'POST',
    mode:'cors',
    cache:'no-store',
    headers:{
      'apikey': SUPABASE_KEY,
      'Content-Type':'application/json'
    },
    body: JSON.stringify(payload)
  });
  let json = null;
  try{ json = await resp.json(); }catch(err){}
  if(!resp.ok){
    const msg = (json && (json.error || json.message)) ? (json.error || json.message) : (resp.status + ' ' + resp.statusText);
    throw new Error(msg);
  }
  if(json && json.error) throw new Error(json.error);
  return json;
}

function genStrongPw(n){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%*?';
  let out = '';
  for(let i=0;i<(n||12);i++) out += chars[Math.floor(Math.random()*chars.length)];
  return out;
}

async function loadAdminList(){
  if(!authState.isAdmin || !supa) return;
  const tb = document.getElementById('adminTbody');
  if(!tb) return;
  tb.innerHTML = '<tr><td colspan="3">加载中…</td></tr>';
  const { data, error } = await supa.from('user_profiles').select('id,email,disabled,role,created_at,updated_at').order('created_at',{ascending:false}).limit(200);
  if(error){
    tb.innerHTML = '<tr><td colspan="3">读取失败：' + escapeHtml(error.message || error) + '</td></tr>';
    return;
  }
  if(!data || !data.length){
    tb.innerHTML = '<tr><td colspan="3">暂无账号数据</td></tr>';
    return;
  }
  tb.innerHTML = data.map(function(r){
    const email = r.email || r.id;
    const enabled = r.disabled !== true;
    const t = r.created_at ? String(r.created_at).replace('T',' ').slice(0,19) : '';
    return '<tr>' +
      '<td>' + escapeHtml(email) + '</td>' +
      '<td><a class="admin-link" data-uid="' + r.id + '" data-enabled="' + (enabled ? '1':'0') + '">' + (enabled ? '✅ 允许' : '⛔ 禁用') + '</a></td>' +
      '<td>' + escapeHtml(t) + '</td>' +
    '</tr>';
  }).join('');
  tb.querySelectorAll('a.admin-link').forEach(function(a){
    a.onclick = async function(){
      const uid = a.getAttribute('data-uid');
      const cur = a.getAttribute('data-enabled') === '1';
      const next = !cur;
      const { error: upE } = await supa.from('user_profiles').update({ disabled: !next }).eq('id', uid);
      if(upE){ showToast('更新失败：' + (upE.message || upE)); return; }
      loadAdminList();
    };
  });
}

async function adminCreateUser(){
  try{
    const email = (prompt('请输入要新建的用户邮箱：') || '').trim();
    if(!email) return;
    let pw = (prompt('请输入初始密码（留空自动生成强密码）：') || '').trim();
    if(!pw) pw = genStrongPw(12);
    if(pw.length < 8){ showToast('密码至少8位'); return; }
    await callEdgeBodyToken('admin-create-user', { admin_email: getCurrentEmail(), target_email: email, target_password: pw });
    showNiceModal('创建成功', '邮箱：' + email + '\n初始密码：' + pw, '✓');
    loadAdminList();
  }catch(e){ showToast('创建失败：' + ((e && e.message) || e)); }
}

async function adminResetPassword(){
  try{
    const email = (prompt('请输入要重置密码的用户邮箱：') || '').trim();
    if(!email) return;
    let pw = (prompt('请输入新密码（留空自动生成强密码）：') || '').trim();
    if(!pw) pw = genStrongPw(12);
    if(pw.length < 8){ showToast('密码至少8位'); return; }
    await callEdgeBodyToken('reset-password', { admin_email: getCurrentEmail(), target_email: email, new_password: pw });
    showNiceModal('重置成功', '邮箱：' + email + '\n新密码：' + pw, '✓');
  }catch(e){ showToast('重置失败：' + ((e && e.message) || e)); }
}

async function adminDeleteUser(){
  try{
    const email = (prompt('请输入要删除的账号邮箱：') || '').trim();
    if(!email) return;
    showConfirmModal('确定删除账号：' + email + ' ？', async function(){
      try{
        try {
          await callEdgeBodyToken('admin-delete-user', { admin_email: getCurrentEmail(), target_email: email, email: email });
        } catch(e1) {
          await callEdgeBodyToken('delete-user', { admin_email: getCurrentEmail(), target_email: email, email: email });
        }
        showToast('删除成功：' + email);
        loadAdminList();
      }catch(e){ showToast('删除失败：' + ((e && e.message) || e)); }
    });
  }catch(e){ showToast('删除失败：' + ((e && e.message) || e)); }
}

window.loadAdminList = loadAdminList;
window.adminCreateUser = adminCreateUser;
window.adminResetPassword = adminResetPassword;
window.adminDeleteUser = adminDeleteUser;

restoreLoginSession();
</script>
